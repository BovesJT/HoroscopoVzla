<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una Ventana a tu Futuro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-bright: #f9e79f;
            --gold-icon: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --bg-deep: #050510;
            --bg-mist: #1a1635;
            --card-bg: rgba(25, 20, 45, 0.85);
            --text-main: #e0e4ff;
            --accent-cyan: #8ff7e2;
            --whatsapp-green: #25D366;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Cormorant Garamond', serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at center, rgba(66, 57, 125, 0.3) 0%, transparent 70%),
                linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mist) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Estrellas con movimiento más sutil */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 200%; height: 200%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.15;
            z-index: 0;
            animation: starsMove 60s linear infinite;
        }

        @keyframes starsMove {
            from { transform: translate(0, 0); }
            to { transform: translate(-50px, -50px); }
        }

        h1 {
            font-family: 'Cinzel Decorative', serif;
            color: var(--gold-bright);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 20px 0 5px;
            font-size: clamp(1.8em, 5vw, 2.8em);
            text-align: center;
            text-shadow: 0 0 20px var(--gold-glow);
            z-index: 1;
        }

        .subtitle {
            font-style: italic;
            margin-bottom: 40px;
            color: var(--accent-cyan);
            font-size: 1.1em;
            text-align: center;
            letter-spacing: 2px;
            z-index: 1;
        }

        .grid-signos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 900px;
            z-index: 2;
        }

        .signo-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 20px 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            backdrop-filter: blur(8px);
            position: relative;
        }

        .signo-card:hover {
            border-color: var(--gold-icon);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 15px var(--gold-glow);
        }

        .simbolo {
            font-size: 3em;
            color: var(--gold-icon);
            display: block;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 10px var(--gold-glow));
            transition: transform 0.4s;
        }

        .signo-card:hover .simbolo {
            transform: scale(1.15);
            filter: drop-shadow(0 0 15px var(--gold-icon));
        }

        .nombre {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.85em;
            color: var(--gold-bright);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ÁREA DE PREDICCIÓN MEJORADA */
        #prediction-area {
            max-width: 700px;
            width: 100%;
            background: rgba(20, 15, 40, 0.95);
            padding: 30px;
            border-radius: 20px;
            margin-top: 40px;
            border: 1px solid var(--gold-icon);
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,215,0,0.1);
            display: none;
            z-index: 10;
            position: relative;
        }

        /* Ritual de carga (Blur animation) */
        .loading {
            filter: blur(10px);
            opacity: 0.5;
            transition: all 0.6s ease;
        }

        .section-title {
            color: var(--accent-cyan);
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.1em;
            margin-top: 25px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(143, 247, 226, 0.2);
            padding-bottom: 5px;
        }

        .section-title::before { content: '✧'; margin-right: 10px; }

        #amor-text, #trabajo-text {
            line-height: 1.7;
            font-size: 1.15em;
            margin: 10px 0;
            color: #f0f0f0;
        }

        .meta-box {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
        }

        .badge {
            color: var(--accent-cyan);
            font-weight: bold;
            border: 1px solid var(--accent-cyan);
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(143, 247, 226, 0.2);
        }

        #share-whatsapp {
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            background: var(--whatsapp-green);
            padding: 12px;
            border-radius: 50px;
            margin-top: 30px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        #share-whatsapp:hover { transform: scale(1.05); }

        @media (max-width: 600px) {
            .grid-signos { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .simbolo { font-size: 2.2em; }
            .nombre { font-size: 0.7em; }
            h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>

    <h1>Una Ventana a tu Futuro</h1>
    <p class="subtitle">La sabiduría de los astros en tu mano</p>
    
    <div class="grid-signos" id="grid"></div>

    <div id="prediction-area">
        <h2 id="selected-sign" style="color: var(--gold-bright); text-align: center; font-family: 'Cinzel Decorative';"></h2>
        
        <span class="section-title">Amor y Destino</span>
        <p id="amor-text"></p>
        
        <span class="section-title">Prosperidad</span>
        <p id="trabajo-text"></p>
        
        <div class="meta-box">
            <div class="meta-item">🔢 Número: <span id="num-luck" class="badge"></span></div>
            <div class="meta-item">🎨 Color: <span id="color-luck" class="badge"></span></div>
        </div>
        
        <a href="#" id="share-whatsapp" target="_blank">Compartir mi destino</a>
    </div>

<script>
    const horoscopoData = {
        "Aries": { simbolo: "♈", amor: "La pasión se desborda, pero cuidado con las palabras impulsivas. Un gesto tierno cambiará tu noche.", trabajo: "Tu ambición está en racha. Es el día perfecto para proponer esa idea que te ronda la cabeza.", numero: "7", color: "Rojo Escarlata" },
        "Tauro": { simbolo: "♉", amor: "La calma regresa. Un momento de paz con alguien querido te recargará el alma.", trabajo: "Cosechas lo que siembras. Un reconocimiento inesperado por tu constancia llegará pronto.", numero: "22", color: "Verde Esmeralda" },
        "Géminis": { simbolo: "♊", amor: "Tu dualidad te permite entender a otros hoy. Escucha más de lo que hablas y atraerás lo que buscas.", trabajo: "Nuevas conexiones traen oportunidades. Una llamada o mensaje abrirá una puerta cerrada.", numero: "5", color: "Amarillo" },
        "Cáncer": { simbolo: "♋", amor: "Protege tu corazón pero no lo cierres. Alguien cercano necesita tu luz y empatía.", trabajo: "Tu intuición financiera es aguda hoy. Confía en ese presentimiento sobre un gasto.", numero: "11", color: "Plata" },
        "Leo": { simbolo: "♌", amor: "Brillarás tanto que podrías cegar. Asegúrate de compartir el protagonismo con tu pareja.", trabajo: "Liderazgo natural. El equipo seguirá tu ritmo si les muestras el camino con generosidad.", numero: "1", color: "Dorado" },
        "Virgo": { simbolo: "♍", amor: "La perfección no existe, pero los momentos hermosos sí. Deja de analizar y siente más.", trabajo: "Detalles que otros pasan por alto serán tu clave del éxito hoy. Tu orden da frutos.", numero: "9", color: "Marrón" },
        "Libra": { simbolo: "♎", amor: "La armonía es tu norte. Un conflicto se resuelve gracias a tu capacidad de mediación.", trabajo: "Semana de equilibrio. No te sobreexijas, el trabajo saldrá mejor si descansas un poco.", numero: "6", color: "Rosa" },
        "Escorpio": { simbolo: "♏", amor: "Intensidad total. Un secreto sale a la luz, pero será para liberar tensiones.", trabajo: "Transformación. Estás dejando atrás un método viejo para abrazar algo mucho más rentable.", numero: "13", color: "Granate" },
        "Sagitario": { simbolo: "♐", amor: "La aventura llama. Un encuentro fuera de tu zona de confort te hará sonreír.", trabajo: "Expansión. Tu visión de futuro es clara. No dejes que las dudas ajenas te detengan.", numero: "3", color: "Violeta" },
        "Capricornio": { simbolo: "♑", amor: "Construyes cimientos fuertes. La lealtad de alguien te demostrará que vas por buen camino.", trabajo: "Disciplina de acero. Estás a un paso de esa meta financiera; no bajes la guardia.", numero: "8", color: "Gris" },
        "Acuario": { simbolo: "♒", amor: "Libertad y conexión. Disfrutarás de tu espacio sin perder la cercanía con los tuyos.", trabajo: "Originalidad premiada. Tu enfoque poco convencional es justo lo que el proyecto necesita.", numero: "2", color: "Turquesa" },
        "Piscis": { simbolo: "♓", amor: "Navegas en aguas románticas. Tu sensibilidad atraerá a alguien muy especial hoy.", trabajo: "Creatividad sin límites. Dedica tiempo a lo artístico; allí reside tu verdadera abundancia.", numero: "18", color: "Celeste" }
    };

    const grid = document.getElementById('grid');
    const area = document.getElementById('prediction-area');
    const whatsappBtn = document.getElementById('share-whatsapp');

    Object.keys(horoscopoData).forEach(signo => {
        const data = horoscopoData[signo];
        const div = document.createElement('div');
        div.className = 'signo-card';
        div.innerHTML = `<span class="simbolo">${data.simbolo}</span><span class="nombre">${signo}</span>`;
        div.onclick = () => mostrarPrediccion(signo);
        grid.appendChild(div);
    });

    function mostrarPrediccion(s) {
        const data = horoscopoData[s];
        
        // Efecto de carga mística
        area.style.display = 'block';
        area.classList.add('loading');
        
        setTimeout(() => {
            document.getElementById('selected-sign').innerText = `${data.simbolo} ${s}`;
            document.getElementById('amor-text').innerText = data.amor;
            document.getElementById('trabajo-text').innerText = data.trabajo;
            document.getElementById('num-luck').innerText = data.numero;
            document.getElementById('color-luck').innerText = data.color;
            
            const mensaje = `✨ *Una Ventana a tu Futuro* ✨\n\nMi destino para *${s}*:\n❤️ *Amor:* ${data.amor}\n💼 *Trabajo:* ${data.trabajo}\n🔢 *Número:* ${data.numero}\n\nMíralo aquí: ${window.location.href}`;
            whatsappBtn.href = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
            
            area.classList.remove('loading');
            window.scrollTo({ top: area.offsetTop - 20, behavior: 'smooth' });
        }, 400); // Pequeño delay para el "ritual" de la IA
    }
</script>
</body>
</html>
